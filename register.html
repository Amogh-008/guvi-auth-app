<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Register | GUVI Auth</title>

<link rel="icon"
href="assets/favicon.png"
type="image/png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand">

🟢 GUVI Auth

</a>

</div>

</nav>

<div class="container py-5">

<div class="text-center mb-4">

<h1 class="page-title">

Create Account

</h1>

<p class="subtitle">

Secure Registration System

</p>

</div>

<div class="card custom-card register-card p-4">

<div class="text-center mb-3">

<svg width="60"
fill="#00ff88"
viewBox="0 0 24 24">

<path d="M12 12a5 5 0 100-10 5 5 0 000 10zm0 2c-5 0-9 2.239-9 5v1h18v-1c0-2.761-4-5-9-5z"/>

</svg>

</div>

<div class="mb-3">
<label>Full Name</label>
<input type="text" id="fullname" class="form-control">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" id="email" class="form-control">
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" id="password" class="form-control">
</div>

<button id="registerBtn"
class="btn btn-success">

Register

</button>

<div id="loader"
class="text-center mt-3 d-none">

<div class="spinner-border text-success">
</div>

</div>

<div id="message"
class="mt-3">

</div>

</div>

</div>

<footer>

Built with ❤️ by Amogh Gaur

</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="js/register.js"></script>

</body>
</html>
