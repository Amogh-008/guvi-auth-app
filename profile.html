<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Profile Dashboard | GUVI Auth</title>

<link rel="icon"
href="assets/favicon.png"
type="image/png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand">

🟢 GUVI Auth

</a>

<button
id="logoutBtn"
class="btn btn-outline-success">

Logout

</button>

</div>

</nav>

<div class="container py-5">

<div class="text-center mb-4">

<h1 class="page-title">

Profile Dashboard

</h1>

<p class="subtitle">

Manage your profile information

</p>

</div>

<div class="card custom-card p-4 mb-4">

<h3 class="mb-2">

🚀 Welcome Back

</h3>

<p class="subtitle mb-0">

Your account is secured using
MySQL, MongoDB and Redis.

</p>

</div>

<div class="row g-4 mb-4">

<div class="col-md-4">

<div class="card custom-card p-4 text-center h-100">

<div style="font-size:50px;">

🟢

</div>

<h6 class="mt-3">

User Status

</h6>

<h3 class="text-success">

ACTIVE

</h3>

</div>

</div>

<div class="col-md-4">

<div class="card custom-card p-4 text-center h-100">

<div style="font-size:50px;">

🍃

</div>

<h6 class="mt-3">

Database

</h6>

<h3>

MongoDB

</h3>

</div>

</div>

<div class="col-md-4">

<div class="card custom-card p-4 text-center h-100">

<div style="font-size:50px;">

⚡

</div>

<h6 class="mt-3">

Session

</h6>

<h3 class="text-success">

Redis

</h3>

</div>

</div>

</div>

<div class="card custom-card profile-card p-4">

<div class="d-flex justify-content-between align-items-center mb-3">

<h3>

👤 Profile Information

</h3>

<span class="badge bg-success">

Authenticated

</span>

</div>

<h6 class="mb-2">

Profile Completion

</h6>

<div class="progress mb-4">

<div
id="profileProgress"
class="progress-bar"
style="width:0%">

0%

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="mb-2">

Full Name

</label>

<input
type="text"
id="fullname"
class="form-control"
readonly>

</div>

<div class="col-md-6 mb-3">

<label class="mb-2">

Email Address

</label>

<input
type="text"
id="email"
class="form-control"
readonly>

</div>

<div class="col-md-6 mb-3">

<label class="mb-2">

Age

</label>

<input
type="number"
id="age"
class="form-control"
placeholder="Enter Age">

</div>

<div class="col-md-6 mb-3">

<label class="mb-2">

Date of Birth

</label>

<input
type="date"
id="dob"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label class="mb-2">

Contact Number

</label>

<input
type="text"
id="contact"
class="form-control"
placeholder="9876543210">

</div>

<div class="col-md-6 mb-3">

<label class="mb-2">

Address

</label>

<input
type="text"
id="address"
class="form-control"
placeholder="Enter Address">

</div>

</div>

<div class="row mt-2">

<div class="col-md-6">

<button
id="updateBtn"
class="btn btn-success w-100">

💾 Save Changes

</button>

</div>

<div class="col-md-6">

<button
id="logoutBtnBottom"
class="btn btn-outline-success w-100">

🚪 Logout

</button>

</div>

</div>

<div
id="loader"
class="text-center mt-4 d-none">

<div
class="spinner-border text-success">

</div>

</div>

<div
id="message"
class="mt-3">

</div>

</div>

</div>

<footer>

Built with ❤️ by Amogh Gaur

</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="js/profile.js"></script>

<script>

$("#logoutBtnBottom").click(function(){

    localStorage.removeItem(
        "sessionId"
    );

    window.location =
    "login.html";

});

</script>

</body>

</html>
